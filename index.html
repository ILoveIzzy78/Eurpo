<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Subway Surfers Demake</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #ui-layer {
            position: absolute; top: 10px; left: 10px; width: 100%; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none;
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; }
        #score { font-size: 20px; font-weight: bold; color: gold; }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; display: none; text-shadow: 2px 2px 4px #000;
        }
        .skin-controls { margin-top: 10px; pointer-events: auto; }
        button {
            padding: 8px 12px; margin-right: 5px; cursor: pointer;
            background: #ff5e00; color: white; border: none; border-radius: 4px; font-weight: bold;
        }
        button:hover { background: #e04d00; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-layer">
        <h1>3D Runner</h1>
        <div id="score">Score: 0</div>
        <div class="skin-controls">
            <span>Choose Skin: </span>
            <button onclick="changeSkin('WIN_20250909_10_42_45_Pro.jpg')">Skin 1</button>
            <button onclick="changeSkin('WIN_20250909_10_43_49_Pro.jpg')">Skin 2</button>
            <button onclick="changeSkin('color')">Default Red</button>
        </div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 40px; color: red;">CRASHED!</h1>
        <p>Press ENTER to Restart</p>
    </div>

    <script>
        // --- 1. GAME SETUP ---
        let score = 0;
        let gameSpeed = 0.4; // How fast obstacles move towards you
        let gameOver = false;
        
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50); // Adds fog in the distance

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8); // Position camera behind and above player
        camera.lookAt(0, 0, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x87CEEB); // Sky blue background
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- 2. THE PLAYER (With Skins) ---
        const textureLoader = new THREE.TextureLoader();
        let currentMaterial = new THREE.MeshLambertMaterial({ color: 0xff3333 }); // Default color
        
        const playerGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const player = new THREE.Mesh(playerGeo, currentMaterial);
        player.position.y = 0.75; // Rest on the ground
        scene.add(player);

        // Skin Changer Function
        window.changeSkin = function(imagePath) {
            if (imagePath === 'color') {
                player.material = new THREE.MeshLambertMaterial({ color: 0xff3333 });
            } else {
                textureLoader.load(imagePath, function(texture) {
                    player.material = new THREE.MeshLambertMaterial({ map: texture });
                }, undefined, function(err) {
                    console.error("Could not load image. Are you running a local web server?", err);
                    alert("Image blocked by browser security. You need to run this on a local web server!");
                });
            }
        };

        // --- 3. THE ENVIRONMENT ---
        // The Ground
        const groundGeo = new THREE.PlaneGeometry(30, 200);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2; // Lay it flat
        ground.position.z = -50;
        scene.add(ground);

        // Lane lines visually
        const laneGeo = new THREE.PlaneGeometry(0.2, 200);
        const laneMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const lineLeft = new THREE.Mesh(laneGeo, laneMat);
        lineLeft.rotation.x = -Math.PI / 2; lineLeft.position.set(-1.5, 0.01, -50); scene.add(lineLeft);
        const lineRight = new THREE.Mesh(laneGeo, laneMat);
        lineRight.rotation.x = -Math.PI / 2; lineRight.position.set(1.5, 0.01, -50); scene.add(lineRight);

        // --- 4. GAME MECHANICS ---
        const laneXPositions = [-3, 0, 3]; // Left, Center, Right lanes
        let currentLane = 1;
        let isJumping = false;
        let verticalVelocity = 0;
        const gravity = -0.015;

        let obstacles = [];

        function spawnObstacle() {
            if (Math.random() > 0.95 - (score * 0.001)) { // Spawns faster over time
                const obsGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
                const obsMat = new THREE.MeshLambertMaterial({ color: 0xffff00 }); // Yellow obstacles
                const obs = new THREE.Mesh(obsGeo, obsMat);
                
                let lane = Math.floor(Math.random() * 3);
                obs.position.set(laneXPositions[lane], 0.75, -60); // Spawn far away
                
                scene.add(obs);
                obstacles.push({ mesh: obs, lane: lane });
            }
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            if (gameOver && e.key === 'Enter') return resetGame();
            if (gameOver) return;

            if (e.key === 'ArrowLeft' && currentLane > 0) currentLane--;
            if (e.key === 'ArrowRight' && currentLane < 2) currentLane++;
            if (e.key === 'ArrowUp' && !isJumping) {
                isJumping = true;
                verticalVelocity = 0.35; // Jump strength
            }
        });

        function resetGame() {
            gameOver = false;
            score = 0;
            gameSpeed = 0.4;
            currentLane = 1;
            player.position.set(laneXPositions[currentLane], 0.75, 0);
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('score').innerText = `Score: 0`;
            
            // Clear obstacles
            obstacles.forEach(obs => scene.remove(obs.mesh));
            obstacles = [];
            animate();
        }

        // --- 5. ANIMATION LOOP ---
        function animate() {
            if (gameOver) return;
            requestAnimationFrame(animate);

            // Handle Horizontal Movement (Smooth lane switching)
            let targetX = laneXPositions[currentLane];
            player.position.x += (targetX - player.position.x) * 0.2;

            // Handle Jumping
            if (isJumping) {
                player.position.y += verticalVelocity;
                verticalVelocity += gravity;
                // Hit the ground
                if (player.position.y <= 0.75) {
                    player.position.y = 0.75;
                    isJumping = false;
                    verticalVelocity = 0;
                }
            }

            // Move Obstacles
            spawnObstacle();
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.mesh.position.z += gameSpeed;

                // Collision Detection
                // Check if they are in the same Z space
                if (obs.mesh.position.z > -1 && obs.mesh.position.z < 1) {
                    // Check if they are in the same lane (X space)
                    if (Math.abs(player.position.x - obs.mesh.position.x) < 1) {
                        // Check if player is NOT high enough to clear it (Y space)
                        if (player.position.y - 0.75 < obs.mesh.position.y + 0.75) {
                            gameOver = true;
                            document.getElementById('game-over').style.display = 'block';
                        }
                    }
                }

                // Remove obstacles that passed behind the camera
                if (obs.mesh.position.z > 10) {
                    scene.remove(obs.mesh);
                    obstacles.splice(i, 1);
                    i--;
                    score += 10;
                    document.getElementById('score').innerText = `Score: ${score}`;
                    gameSpeed += 0.002; // Slowly increase speed
                }
            }

            renderer.render(scene, camera);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start game
        animate();
    </script>
</body>
</html>
